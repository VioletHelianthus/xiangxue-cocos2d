<html>
<head><title>Game UI</title></head>
<body>
  <div data-name="root" style="width:640px;height:960px">

    <!-- Top bar -->
    <div data-name="topBar" style="width:640px;height:80px;left:0;top:0;display:flex;flex-direction:row">
      <img data-name="avatar" src="res/avatar.png" style="width:64px;height:64px;left:8px;top:8px" data-anchor="0,0"/>
      <label data-name="playerName" style="width:200px;height:40px;left:80px;top:20px">PlayerOne</label>
      <div data-name="currencyPanel" style="width:180px;height:40px;left:440px;top:20px;display:flex;flex-direction:row">
        <img data-name="coinIcon" src="res/coin.png" style="width:32px;height:32px;left:0;top:4px" data-anchor="0,0"/>
        <label data-name="coinCount" style="width:100px;height:32px;left:36px;top:4px">99999</label>
      </div>
    </div>

    <!-- Center content area with scroll -->
    <div data-name="contentArea" style="width:600px;height:600px;left:20px;top:100px;overflow:scroll">
      <div data-name="cardGrid" style="width:580px;height:1200px;display:flex;flex-direction:column;gap:12px;padding:10px 20px">

        <div data-name="card_1" style="width:540px;height:180px;left:0;top:0;transform-origin:center">
          <img data-name="cardBg_1" src="res/card_bg.png" style="width:540px;height:180px;left:0;top:0" data-anchor="0,0"/>
          <label data-name="cardTitle_1" style="width:300px;height:40px;left:20px;top:20px">Fire Dragon</label>
          <p data-name="cardDesc_1" style="width:500px;height:60px;left:20px;top:70px">A legendary dragon that breathes fire and guards ancient treasures.</p>
          <button id="cardBtn_1" style="width:120px;height:40px;left:400px;top:130px;transform-origin:50% 50%">Equip</button>
        </div>

        <div data-name="card_2" style="width:540px;height:180px;left:0;top:0;transform-origin:center">
          <img data-name="cardBg_2" src="res/card_bg.png" style="width:540px;height:180px;left:0;top:0" data-anchor="0,0"/>
          <label data-name="cardTitle_2" style="width:300px;height:40px;left:20px;top:20px">Ice Phoenix</label>
          <p data-name="cardDesc_2" style="width:500px;height:60px;left:20px;top:70px">A mythical bird reborn from ice crystals in the frozen peaks.</p>
          <button id="cardBtn_2" style="width:120px;height:40px;left:400px;top:130px">Equip</button>
        </div>

        <div data-name="card_3" style="width:540px;height:180px;left:0;top:0">
          <img data-name="cardBg_3" src="res/card_bg.png" style="width:540px;height:180px;left:0;top:0" data-anchor="0,0"/>
          <label data-name="cardTitle_3" style="width:300px;height:40px;left:20px;top:20px">Shadow Wolf</label>
          <p data-name="cardDesc_3" style="width:500px;height:60px;left:20px;top:70px">Moves silently through darkness, striking without warning.</p>
          <button id="cardBtn_3" style="width:120px;height:40px;left:400px;top:130px">Equip</button>
        </div>

      </div>
    </div>

    <!-- Bottom navigation -->
    <div data-name="bottomNav" style="width:640px;height:100px;left:0;top:860px;display:flex;flex-direction:row">
      <button id="btn_home" style="width:120px;height:80px;left:20px;top:10px;transform-origin:center">Home</button>
      <button id="btn_shop" style="width:120px;height:80px;left:160px;top:10px;transform-origin:center">Shop</button>
      <button id="btn_inventory" style="width:120px;height:80px;left:300px;top:10px;transform-origin:center">Bag</button>
      <button id="btn_settings" style="width:120px;height:80px;left:440px;top:10px;transform-origin:center">Settings</button>
    </div>

    <!-- HP / Progress overlay -->
    <div data-widget="ProgressBar" data-name="hpBar" style="width:200px;height:20px;left:80px;top:52px"></div>
    <div data-widget="Slider" data-name="volumeSlider" style="width:300px;height:30px;left:170px;top:920px"></div>
    <div data-widget="CheckBox" data-name="muteToggle" style="width:40px;height:40px;left:120px;top:915px"></div>

  </div>
</body>
</html>
